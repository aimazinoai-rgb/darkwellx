name: Darkwell APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: APK build
        run: gradle android:assembleDebug --no-daemon

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: Darkwell-APK
          path: android/build/outputs/apk/debug/android-debug.apk
          retention-days: 30
